<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Império dos Ebooks</title>
<style>
body{font-family:Arial,Helvetica,sans-serif;margin:0;background:#111;color:#fff}
header{background:#000;padding:20px;text-align:center;font-size:24px;font-weight:bold}
.container{max-width:1100px;margin:auto;padding:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px}
.card{background:#1c1c1c;border-radius:10px;padding:15px}
.card img{width:100%;border-radius:8px}
.price{font-size:20px;margin:10px 0}
button{background:#fff;color:#000;border:none;padding:10px 15px;border-radius:6px;cursor:pointer;font-weight:bold}
button:hover{opacity:.85}
.admin{margin-top:40px;background:#1a1a1a;padding:20px;border-radius:10px;display:none}
.login{margin-top:40px;background:#1a1a1a;padding:20px;border-radius:10px}
input,textarea{width:100%;padding:8px;margin-top:6px;margin-bottom:12px;border-radius:5px;border:none}
</style>
</head>
<body><header>Império dos Ebooks</header><div class="container"><h2>Ebooks disponíveis</h2>
<div id="products" class="grid"></div><div class="login" id="loginBox">
<h2>Área do Administrador</h2><label>Email</label> <input id="adminEmail" placeholder="Digite seu email">

<label>Senha</label> <input id="adminPass" type="password" placeholder="Digite a senha">

<button onclick="loginAdmin()">Entrar</button>

</div><div class="admin" id="adminPanel">
<h2>Adicionar Produto</h2><label>Título</label> <input id="title">

<label>Descrição</label>

<textarea id="desc"></textarea><label>Preço</label> <input id="price">

<label>Imagem (URL)</label> <input id="image">

<label>Link de pagamento (Kiwify, Hotmart, etc)</label> <input id="paylink" placeholder="https://pay.kiwify.com/...">

<button onclick="addProduct()">Adicionar Produto</button>

</div></div><script>

const ADMIN_EMAIL = "lucasminecraft1107@gmail.com";
const ADMIN_PASS = "nda2602ll";

let products = JSON.parse(localStorage.getItem('ebooks') || '[]');

function render(){
const container=document.getElementById('products');
container.innerHTML='';

products.forEach(p=>{
const div=document.createElement('div');
div.className='card';

div.innerHTML=`
<img src="${p.image}">
<h3>${p.title}</h3>
<p>${p.desc}</p>
<div class="price">R$ ${p.price}</div>
<a href="${p.paylink}" target="_blank">
<button>Comprar</button>
</a>
`;

container.appendChild(div);
});
}

function loginAdmin(){
const email=document.getElementById('adminEmail').value;
const pass=document.getElementById('adminPass').value;

if(email===ADMIN_EMAIL && pass===ADMIN_PASS){

 document.getElementById('loginBox').style.display='none';
 document.getElementById('adminPanel').style.display='block';

}else{
 alert('Email ou senha incorretos');
}
}

function addProduct(){

const title=document.getElementById('title').value;
const desc=document.getElementById('desc').value;
const price=document.getElementById('price').value;
const image=document.getElementById('image').value;
const paylink=document.getElementById('paylink').value;

const product={title,desc,price,image,paylink};

products.push(product);
localStorage.setItem('ebooks',JSON.stringify(products));

render();

alert('Produto adicionado!');
}

render();

</script></body>
</html>
